<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center;
               background: radial-gradient(ellipse at top left, #0F2438 0%, #0B1220 45%, #0B1220 100%); color:#E2E8F0; }
        .box { text-align:center; }
        h1 { font-size:4rem; font-weight:800; margin:0; background:linear-gradient(135deg,#0D9488,#22D3EE); -webkit-background-clip:text; background-clip:text; color:transparent; }
        p { color:#94A3B8; margin: 0.5rem 0 1.5rem; }
        a { background:linear-gradient(135deg,#0D9488,#22D3EE); color:#04202A; padding:0.65rem 1.3rem; border-radius:9px; font-weight:700; text-decoration:none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>404</h1>
        <p>Page not found.</p>
        <a href="/dashboard">Go to Dashboard</a>
    </div>
</body>
</html>
