name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: threatshield
          POSTGRES_PASSWORD: threatshield
          POSTGRES_DB: threatshield
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U threatshield"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://threatshield:threatshield@localhost:5432/threatshield
        run: |
          pytest -vv
      - name: Lint
        run: |
          pip install flake8
          flake8 .
