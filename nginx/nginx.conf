# Nginx reverse proxy for ThreatShield
# Terminates client connections and forwards to the FastAPI/Uvicorn app.

upstream threatshield_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Security headers (also set by the app; duplicated here for defense-in-depth
    # when the app is fronted directly by Nginx in production).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        proxy_pass http://threatshield_app;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://threatshield_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location /api/health {
        proxy_pass http://threatshield_app;
        access_log off;
    }
}
