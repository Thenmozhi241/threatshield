# Prometheus configuration for ThreatShield
# Scrapes the FastAPI app's health endpoint and (if added) a metrics endpoint.
# NOTE: This project does not ship a /metrics endpoint out of the box; add
# `prometheus-fastapi-instrumentator` and expose /metrics in app/main.py to
# get full request-level metrics. This config is ready for that addition.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "threatshield-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
